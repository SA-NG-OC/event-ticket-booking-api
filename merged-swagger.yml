    post:
      tags:
        - Bookings (Customer)
      summary: Create a new booking
      description: >
        Creates a booking with oversell protection (SELECT FOR UPDATE on ticket
        tier).


        **Idempotency:** Send the same `idempotencyKey` UUID on retry — the
        original booking

        is returned without creating a duplicate.


        **Async payment:** After creation, a background job simulates payment
        (2s delay).

        Poll `GET /bookings/{id}` to check if status changed to `confirmed` or
        `failed`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
            example:
              ticketTierId: bce7708f-8eb9-4562-96de-70175956c0b0
              quantity: 2
              voucherCode: SUMMER10
              idempotencyKey: cf52e84c-b978-4702-bfc8-2fcdd4be5faa
      responses:
        '201':
          description: Booking created (status = pending, payment processing async)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Booking'
              example:
                success: true
                data:
                  id: 0129350f-a477-48f2-84e9-bd815d04feae
                  userId: 54c9aa07-ee4b-45e2-beb1-4944dfa72b9d
                  ticketTierId: bce7708f-8eb9-4562-96de-70175956c0b0
                  concertId: fb353d72-13c5-42c2-b35e-62607018d5f0
                  quantity: 2
                  unitPrice: 3500000
                  totalAmount: 7000000
                  discountAmount: 0
                  finalAmount: 7000000
                  voucherCode: SUMMER10
                  status: pending
                  idempotencyKey: cf52e84c-b978-4702-bfc8-2fcdd4be5faa
                  isFlagged: false
                  flagReason: null
                  createdAt: '2026-05-09T15:04:12.208Z'
                  updatedAt: '2026-05-09T15:04:12.208Z'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
