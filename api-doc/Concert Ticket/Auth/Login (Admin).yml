info:
  name: Login (Admin)
  type: http
  seq: 4

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "email": "admin@gmail.com",
        "password": "12345678"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var data = res.getBody();
        bru.setVar("accessTokenAdmin", data.data.accessToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
