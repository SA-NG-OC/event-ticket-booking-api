/bookings:
  get:
    tags: [Bookings (Admin)]
    summary: List all bookings with filters (admin)
    security: [{ bearerAuth: [] }]
    parameters:
      - in: query
        name: userId
        schema: { type: string, format: uuid }
        example: "54c9aa07-ee4b-45e2-beb1-4944dfa72b9d"
      - in: query
        name: concertId
        schema: { type: string, format: uuid }
        example: "fb353d72-13c5-42c2-b35e-62607018d5f0"
      - in: query
        name: status
        schema: { type: string, enum: [pending, confirmed, cancelled, failed] }
        example: cancelled
      - in: query
        name: isFlagged
        schema: { type: string, enum: ["true", "false"] }
        example: "true"
      - in: query
        name: page
        schema: { type: integer, minimum: 1, default: 1 }
        example: 1
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        example: 10
    responses:
      "200":
        description: Paginated list of all bookings
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BookingListResponse" }
            example:
              success: true
              data:
                bookings:
                  - id: "0129350f-a477-48f2-84e9-bd815d04feae"
                    userId: "54c9aa07-ee4b-45e2-beb1-4944dfa72b9d"
                    ticketTierId: "bce7708f-8eb9-4562-96de-70175956c0b0"
                    concertId: "fb353d72-13c5-42c2-b35e-62607018d5f0"
                    quantity: 2
                    unitPrice: 3500000
                    totalAmount: 7000000
                    discountAmount: 0
                    finalAmount: 7000000
                    voucherCode: null
                    status: confirmed
                    idempotencyKey: "cf52e84c-b978-4702-bfc8-2fcdd4be5faa"
                    isFlagged: false
                    flagReason: null
                    createdAt: "2026-05-09T15:04:12.208Z"
                    updatedAt: "2026-05-09T15:04:14.380Z"
                  - id: "29033b34-ea66-48b7-bc14-8b748e593d06"
                    userId: "54c9aa07-ee4b-45e2-beb1-4944dfa72b9d"
                    ticketTierId: "bce7708f-8eb9-4562-96de-70175956c0b0"
                    concertId: "fb353d72-13c5-42c2-b35e-62607018d5f0"
                    quantity: 2
                    unitPrice: 3500000
                    totalAmount: 7000000
                    discountAmount: 0
                    finalAmount: 7000000
                    voucherCode: null
                    status: confirmed
                    idempotencyKey: "cf52e84c-b978-4702-bfc8-2fcdd4be5fad"
                    isFlagged: false
                    flagReason: null
                    createdAt: "2026-05-09T14:46:18.221Z"
                    updatedAt: "2026-05-09T14:46:20.327Z"
                total: 2
                page: 1
                limit: 20
      "403":
        description: Admin access required
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ErrorResponse" }
            example: { success: false, type: "FORBIDDEN", message: "Admin access required" }

  post:
    tags: [Bookings (Customer)]
    summary: Create a new booking
    description: |
      Creates a booking with oversell protection (SELECT FOR UPDATE on ticket tier).

      **Idempotency:** Send the same `idempotencyKey` UUID on retry — the original booking
      is returned without creating a duplicate.

      **Async payment:** After creation, a background job simulates payment (2s delay).
      Poll `GET /bookings/{id}` to check if status changed to `confirmed` or `failed`.
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/CreateBookingRequest" }
          example:
            ticketTierId: "bce7708f-8eb9-4562-96de-70175956c0b0"
            quantity: 2
            voucherCode: null
            idempotencyKey: "cf52e84c-b978-4702-bfc8-2fcdd4be5faa"
    responses:
      "201":
        description: Booking created (status = pending, payment processing async)
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: "#/components/schemas/Booking" }
            example:
              success: true
              data:
                id: "0129350f-a477-48f2-84e9-bd815d04feae"
                userId: "54c9aa07-ee4b-45e2-beb1-4944dfa72b9d"
                ticketTierId: "bce7708f-8eb9-4562-96de-70175956c0b0"
                concertId: "fb353d72-13c5-42c2-b35e-62607018d5f0"
                quantity: 2
                unitPrice: 3500000
                totalAmount: 7000000
                discountAmount: 0
                finalAmount: 7000000
                voucherCode: null
                status: pending
                idempotencyKey: "cf52e84c-b978-4702-bfc8-2fcdd4be5faa"
                isFlagged: false
                flagReason: null
                createdAt: "2026-05-09T15:04:12.208Z"
                updatedAt: "2026-05-09T15:04:12.208Z"
      "400":
        description: Validation error
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ErrorResponse" }
            example: { success: false, type: "VALIDATION", message: "Quantity must be between 1 and 10" }
      "401":
        description: Missing or invalid JWT token
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ErrorResponse" }
            example: { success: false, type: "UNAUTHORIZED", message: "Missing or invalid Authorization header" }
      "404":
        description: Ticket tier or concert not found
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ErrorResponse" }
            example: { success: false, type: "NOT_FOUND", message: "Ticket tier not found" }
      "409":
        description: Not enough tickets available, or voucher already used
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ErrorResponse" }
            examples:
              oversell:
                summary: Not enough tickets
                value: { success: false, type: "CONFLICT", message: "Not enough tickets. Available: 3, Requested: 5" }
              voucher_used:
                summary: Voucher already used by this user
                value: { success: false, type: "CONFLICT", message: "You have already used this voucher" }
      "422":
        description: Business rule violation
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ErrorResponse" }
            examples:
              not_on_sale:
                summary: Concert not accepting bookings
                value: { success: false, type: "BUSINESS_RULE", message: "Concert is not accepting bookings" }
              voucher_expired:
                summary: Voucher expired
                value: { success: false, type: "BUSINESS_RULE", message: "Voucher has expired" }
              min_order:
                summary: Order below minimum value
                value: { success: false, type: "BUSINESS_RULE", message: "Minimum order value for this voucher is 500000" }

