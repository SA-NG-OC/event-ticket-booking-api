/bookings/{id}:
  get:
    tags: [Bookings (Customer)]
    summary: Get booking detail by ID
    description: Customer can only view their own bookings. Admin can view any.
    security: [{ bearerAuth: [] }]
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        example: "0129350f-a477-48f2-84e9-bd815d04feae"
    responses:
      "200":
        description: Booking detail
        content:
          application/json:
