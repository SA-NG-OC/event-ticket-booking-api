info:
  name: List All Bookings
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/bookings?status=cancelled&isFlagged=true&page=1&limit=10"
  params:
    - name: status
      value: cancelled
      type: query
    - name: isFlagged
      value: "true"
      type: query
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
