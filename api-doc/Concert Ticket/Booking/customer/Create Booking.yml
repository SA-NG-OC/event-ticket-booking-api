info:
  name: Create Booking
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/bookings"
  body:
    type: json
    data: |-
      {
        "ticketTierId": "bce7708f-8eb9-4562-96de-70175956c0b0",
        "quantity": 2,
        "idempotencyKey": "cf52e84c-b978-4702-bfc8-2fcdd4be5fad"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var data = res.getBody();
        bru.setVar("bookingId", data.data.id);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
