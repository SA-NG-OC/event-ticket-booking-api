                  name: Flash Sale 10%
                  code: FLASHSALE10
                  discountType: percentage
                  discountValue: 10
                  maxUses: 500
                  minOrderValue: 500000
                  expiresAt: '2099-12-31T23:59:59.000Z'
                  concertId: fb353d72-13c5-42c2-b35e-62607018d5f0
              concert_fixed:
                summary: VIP 200k off (scoped to one concert)
                value:
                  name: VIP Discount
                  code: VIP200K
                  discountType: fixed
                  discountValue: 200000
                  maxUses: 100
                  minOrderValue: 2000000
                  concertId: c1b2c3d4-0000-0000-0000-000000000001
      responses:
        '201':
          description: Voucher campaign created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Voucher'
              example:
                success: true
                data:
                  id: v1b2c3d4-0000-0000-0000-000000000001
                  name: Flash Sale 10%
                  code: FLASHSALE10
                  discountType: percentage
                  discountValue: 10
                  maxUses: 500
                  usedCount: 0
                  remainingUses: 500
                  minOrderValue: 500000
                  expiresAt: '2099-12-31T23:59:59.000Z'
                  concertId: null
                  isExpired: false
                  isExhausted: false
                  createdAt: '2025-06-01T08:00:00.000Z'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                bad_code_format:
                  summary: Invalid code format
                  value:
                    success: false
                    type: VALIDATION
                    message: >-
                      Code must be 3–50 uppercase alphanumeric characters (A-Z,
                      0-9, _, -)
                percentage_over_100:
                  summary: Percentage exceeds 100
                  value:
                    success: false
                    type: VALIDATION
                    message: Percentage discount cannot exceed 100
                zero_discount:
                  summary: Discount value is zero
                  value:
                    success: false
                    type: VALIDATION
                    message: discountValue must be greater than 0
                max_uses_zero:
                  summary: maxUses less than 1
                  value:
                    success: false
                    type: VALIDATION
                    message: maxUses must be at least 1
                negative_min_order:
                  summary: Negative minOrderValue
                  value:
                    success: false
                    type: VALIDATION
                    message: minOrderValue must be 0 or greater
                code_too_short:
                  summary: Code shorter than 3 chars
                  value:
                    success: false
                    type: VALIDATION
                    message: code must be at least 3 characters
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                type: UNAUTHORIZED
                message: Missing or invalid Authorization header
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                type: FORBIDDEN
                message: Admin access required
        '404':
