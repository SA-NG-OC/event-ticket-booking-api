info:
  name: Get Voucher By Concert
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/vouchers?concertId={{concertId}}&page=1&limit=10"
  params:
    - name: concertId
      value: "{{concertId}}"
      type: query
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
