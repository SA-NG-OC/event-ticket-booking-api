info:
  name: Get My Bookings
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/bookings/my?page=1&limit=20"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "20"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
