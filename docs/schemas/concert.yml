Concert:
  type: object
  properties:
    id:
      type: string
      format: uuid
      example: 8f205135-f395-421a-9b45-9815a2246e9e
    name:
      type: string
      example: Sơn Tùng Sky Tour 2026
    description:
      type: string
      nullable: true
      example: Live concert with special guest performances and visual stage effects.
    venue:
      type: string
      example: Sân vận động Mỹ Đình
    artistName:
      type: string
      example: Sơn Tùng M-TP
    eventDate:
      type: string
      format: date-time
      example: "2026-12-20T19:00:00.000Z"
    status:
      type: string
      enum:
        - draft
        - on_sale
        - sold_out
        - cancelled
        - completed
      example: draft
    createdAt:
      type: string
      format: date-time
      example: "2026-05-09T09:42:12.886Z"
    updatedAt:
      type: string
      format: date-time
      example: "2026-05-09T09:42:12.886Z"

TicketTier:
  type: object
  properties:
    id:
      type: string
      format: uuid
      example: cf52e84c-b978-4702-bfc8-2fcdd4be5fad
    concertId:
      type: string
      format: uuid
      example: 8f205135-f395-421a-9b45-9815a2246e9e
    name:
      type: string
      example: VIP
    price:
      type: number
      example: 3500000
    totalQty:
      type: integer
      example: 100
    reservedQty:
      type: integer
      example: 0
    availableQty:
      type: integer
      example: 100
    createdAt:
      type: string
      format: date-time
      example: "2026-05-09T09:42:18.458Z"
    updatedAt:
      type: string
      format: date-time
      example: "2026-05-09T09:42:18.458Z"

CreateConcertRequest:
  type: object
  required:
    - name
    - venue
    - artistName
    - eventDate
  properties:
    name:
      type: string
      minLength: 3
      maxLength: 255
      example: Sơn Tùng Sky Tour 2026
    description:
      type: string
      maxLength: 2000
      example: Live concert with special guest performances and visual stage effects.
    venue:
      type: string
      minLength: 2
      maxLength: 255
      example: Sân vận động Mỹ Đình
    artistName:
      type: string
      minLength: 1
      maxLength: 255
      example: Sơn Tùng M-TP
    eventDate:
      type: string
      format: date-time
      example: "2026-12-20T19:00:00.000Z"

AddTicketTiersRequest:
  type: object
  required:
    - tiers
  properties:
    tiers:
      type: array
      minItems: 1
      items:
        type: object
        required:
          - name
          - price
          - totalQty
        properties:
          name:
            type: string
            minLength: 1
            maxLength: 100
            example: VIP
          price:
            type: number
            example: 3500000
          totalQty:
            type: integer
            example: 100
      example:
        - name: VIP
          price: 3500000
          totalQty: 100
        - name: STANDARD
          price: 1200000
          totalQty: 500
        - name: EARLY_BIRD
          price: 800000
          totalQty: 200