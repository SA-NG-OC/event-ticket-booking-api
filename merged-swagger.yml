    post:
      tags:
        - Vouchers (Admin)
      summary: Create a new voucher campaign (admin)
      description: >
        **Scope rules:**

        - Omit `concertId` → voucher applies to all concerts.

        - Provide `concertId` → voucher is restricted to that concert only.


        **Code format:** 3–50 uppercase alphanumeric characters (`A-Z`, `0-9`,
        `_`, `-`).


        **Percentage cap:** `discountValue` must be 1–100 when `discountType =
        percentage`.
      security:
