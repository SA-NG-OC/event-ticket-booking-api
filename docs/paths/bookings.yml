                ticketTierId: "bce7708f-8eb9-4562-96de-70175956c0b0"
                concertId: "fb353d72-13c5-42c2-b35e-62607018d5f0"
                quantity: 2
                unitPrice: 3500000
                totalAmount: 7000000
                discountAmount: 0
                finalAmount: 7000000
                voucherCode: null
                status: confirmed
                idempotencyKey: "cf52e84c-b978-4702-bfc8-2fcdd4be5faa"
                isFlagged: true
                flagReason: "User made 5 bookings within 1 minute — suspected bot"
                createdAt: "2026-05-09T15:04:12.208Z"
                updatedAt: "2026-05-09T17:13:02.803Z"
      "404":
        description: Booking not found
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ErrorResponse" }
            example: { success: false, type: "NOT_FOUND", message: "Booking not found" }

