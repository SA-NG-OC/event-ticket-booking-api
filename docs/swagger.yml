openapi: "3.0.3"

info:
  title: Concert Booking API
  version: "1.0.0"
  description: |
    Backend API for Concert Ticket Booking Platform.

    **Auth:** Include `Authorization: Bearer <token>` on protected endpoints  
    **Roles:** `customer` booking flows | `admin` operations dashboard

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Concerts (Customer)
    description: Public concert browsing
  - name: Concerts (Admin)
    description: Concert management
  - name: Bookings (Customer)        
    description: Ticket booking flows
  - name: Bookings (Admin)          
    description: Booking management
  - name: Vouchers (Customer)       
    description: Voucher preview
  - name: Vouchers (Admin)           
    description: Voucher management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Common ──────────────────────────────────────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        type:
          type: string
          example: CONFLICT
        message:
          type: string
          example: Email already exists

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 5

    # ── Auth ────────────────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [email, password, name]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: secret123
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Nguyen Van A

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@gmail.com
        password:
          type: string
          minLength: 1
          example: secret123

    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: a10fc229-6cdc-4232-b538-a2b53be912e4
        email:
          type: string
          format: email
          example: admin@gmail.com
        name:
          type: string
          example: Sang
        role:
          type: string
          enum: [customer, admin]
          example: admin

    AuthTokens:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: "#/components/schemas/AuthUser"

    MeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 4c9570aa-eb54-4df4-9607-a7e57940b1d0
        role:
          type: string
          enum: [customer, admin]
          example: customer

    # ── Concert ─────────────────────────────────────────────────────────────────
    Concert:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 8f205135-f395-421a-9b45-9815a2246e9e
        name:
          type: string
          example: "Son Tung Sky Tour 2026"
        description:
          type: string
          nullable: true
          example: Live concert with special guest performances and visual stage effects.
        venue:
          type: string
          example: "San van dong My Dinh"
        artistName:
          type: string
          example: "Son Tung M-TP"
        eventDate:
          type: string
          format: date-time
          example: "2026-12-20T19:00:00.000Z"
        status:
          type: string
          enum: [draft, on_sale, sold_out, cancelled, completed]
          example: draft
        createdAt:
          type: string
          format: date-time
          example: "2026-05-09T09:42:12.886Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-05-09T09:42:12.886Z"

    TicketTier:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: cf52e84c-b978-4702-bfc8-2fcdd4be5fad
        concertId:
          type: string
          format: uuid
          example: 8f205135-f395-421a-9b45-9815a2246e9e
        name:
          type: string
          example: VIP
        price:
          type: number
          example: 3500000
        totalQty:
          type: integer
          example: 100
        reservedQty:
          type: integer
          example: 0
        soldQty:           
          type: integer
          example: 40
        availableQty:
          type: integer
          example: 50
        createdAt:
          type: string
          format: date-time
          example: "2026-05-09T09:42:18.458Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-05-09T09:42:18.458Z"

    CreateConcertRequest:
      type: object
      required: [name, venue, artistName, eventDate]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 255
          example: "Son Tung Sky Tour 2026"
        description:
          type: string
          maxLength: 2000
          example: Live concert with special guest performances and visual stage effects.
        venue:
          type: string
          minLength: 2
          maxLength: 255
          example: "San van dong My Dinh"
        artistName:
          type: string
          minLength: 1
          maxLength: 255
          example: "Son Tung M-TP"
        eventDate:
          type: string
          format: date-time
          example: "2026-12-20T19:00:00.000Z"

    AddTicketTiersRequest:
      type: object
      required: [tiers]
      properties:
        tiers:
          type: array
          minItems: 1
          items:
            type: object
            required: [name, price, totalQty]
            properties:
              name:
                type: string
                minLength: 1
                maxLength: 100
                example: VIP
              price:
                type: number
                example: 3500000
              totalQty:
                type: integer
                example: 100
          example:
            - { name: VIP,        price: 3500000, totalQty: 100 }
            - { name: STANDARD,   price: 1200000, totalQty: 500 }
            - { name: EARLY_BIRD, price: 800000,  totalQty: 200 }
            
    Booking:
      type: object
      properties:
        id:             { type: string, format: uuid, example: "a1b2c3d4-0000-0000-0000-000000000001" }
        userId:         { type: string, format: uuid, example: "u1b2c3d4-0000-0000-0000-000000000001" }
        ticketTierId:   { type: string, format: uuid, example: "t1b2c3d4-0000-0000-0000-000000000001" }
        concertId:      { type: string, format: uuid, example: "c1b2c3d4-0000-0000-0000-000000000001" }
        quantity:       { type: integer, minimum: 1, maximum: 10, example: 2 }
        unitPrice:      { type: number, example: 1500000 }
        totalAmount:    { type: number, example: 3000000 }
        discountAmount: { type: number, example: 300000 }
        finalAmount:    { type: number, example: 2700000 }
        voucherCode:    { type: string, nullable: true, maxLength: 50, example: "FLASHSALE10" }
        status:
          type: string
          enum: [pending, confirmed, cancelled, failed]
          example: pending
        idempotencyKey: { type: string, format: uuid, example: "e7f8a9b0-1111-2222-3333-444455556666" }
        isFlagged:      { type: boolean, example: false }
        flagReason:     { type: string, nullable: true, example: null }
        createdAt:      { type: string, format: date-time, example: "2025-06-01T10:00:00.000Z" }
        updatedAt:      { type: string, format: date-time, example: "2025-06-01T10:00:05.000Z" }
 
    BookingListResponse:
      type: object
      properties:
        success:  { type: boolean, example: true }
        data:
          type: object
          properties:
            bookings:
              type: array
              items: { $ref: "#/components/schemas/Booking" }
            total:  { type: integer, example: 42 }
            page:   { type: integer, example: 1 }
            limit:  { type: integer, example: 20 }
 
    CreateBookingRequest:
      type: object
      required: [ticketTierId, quantity, idempotencyKey]
      properties:
        ticketTierId:
          type: string
          format: uuid
          example: "t1b2c3d4-0000-0000-0000-000000000001"
        quantity:
          type: integer
          minimum: 1
          maximum: 10
          example: 2
        voucherCode:
          type: string
          minLength: 1
          maxLength: 50
          nullable: true
          example: "FLASHSALE10"
        idempotencyKey:
          type: string
          format: uuid
          description: Client-generated UUID. Same key returns same booking (no duplicate).
          example: "e7f8a9b0-1111-2222-3333-444455556666"
 
    UpdateStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [confirmed, cancelled, failed]
          example: confirmed
 
    FlagBookingRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 500
          example: "User made 5 bookings within 1 minute — suspected bot"
    
    # ── Voucher ──────────────────────────────────────────────────────────────────
    Voucher:
      type: object
      properties:
        id:            { type: string, format: uuid, example: "v1b2c3d4-0000-0000-0000-000000000001" }
        name:          { type: string, example: "Flash Sale 10%" }
        code:          { type: string, example: "FLASHSALE10" }
        discountType:  { type: string, enum: [percentage, fixed], example: "percentage" }
        discountValue: { type: number, example: 10 }
        maxUses:       { type: integer, minimum: 1, example: 500 }
        usedCount:     { type: integer, example: 42 }
        remainingUses: { type: integer, example: 458, description: "Computed: maxUses - usedCount" }
        minOrderValue: { type: number, minimum: 0, example: 500000 }
        expiresAt:     { type: string, format: date-time, nullable: true, example: "2099-12-31T23:59:59.000Z" }
        concertId:     { type: string, format: uuid, nullable: true, example: null, description: "null = applies to all concerts" }
        isExpired:     { type: boolean, example: false, description: "Computed: expiresAt < now" }
        isExhausted:   { type: boolean, example: false, description: "Computed: usedCount >= maxUses" }
        createdAt:     { type: string, format: date-time, example: "2025-06-01T08:00:00.000Z" }
 
    VoucherPreview:
      type: object
      properties:
        code:           { type: string, example: "FLASHSALE10" }
        discountType:   { type: string, enum: [percentage, fixed], example: "percentage" }
        discountAmount: { type: number, example: 200000, description: "Amount to be deducted" }
        finalAmount:    { type: number, example: 1800000, description: "orderAmount - discountAmount" }
        description:    { type: string, example: "10% off" }
 
    CreateVoucherRequest:
      type: object
      required: [name, code, discountType, discountValue, maxUses]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 255
          example: "Flash Sale 10%"
        code:
          type: string
          minLength: 3
          maxLength: 50
          pattern: "^[A-Z0-9_-]{3,50}$"
          description: "Uppercase alphanumeric only (A-Z, 0-9, _, -)"
          example: "FLASHSALE10"
        discountType:
          type: string
          enum: [percentage, fixed]
          example: "percentage"
        discountValue:
          type: number
          exclusiveMinimum: 0
          description: "For percentage: 1–100. For fixed: any positive number (VND)."
          example: 10
        maxUses:
          type: integer
          minimum: 1
          example: 500
        minOrderValue:
          type: number
          minimum: 0
          default: 0
          example: 0
        expiresAt:
          type: string
          format: date-time
          nullable: true
          example: "2099-12-31T23:59:59.000Z"
        concertId:
          type: string
          format: uuid
          nullable: true
          description: "Scope voucher to one concert. Omit (or null) for all concerts."
          example: null
 
    UpdateVoucherRequest:
      type: object
      description: "At least one field required. Only name, maxUses, expiresAt can be changed."
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 255
          example: "Flash Sale 10% — Extended"
        maxUses:
          type: integer
          minimum: 1
          description: "Cannot be set below current usedCount"
          example: 1000
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: "null = remove expiry. Must be future date if provided."
          example: "2099-06-30T23:59:59.000Z"
 
    VoucherListResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            vouchers:
              type: array
              items: { $ref: "#/components/schemas/Voucher" }
            total: { type: integer, example: 3 }
            page:  { type: integer, example: 1 }
            limit: { type: integer, example: 20 }