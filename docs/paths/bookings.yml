/bookings/{id}/cancel:
  patch:
    tags: [Bookings (Customer)]
    summary: Cancel my booking
    description: |
      Customer can cancel their own `pending` or `confirmed` booking.
      If booking was `confirmed`, reserved inventory is released automatically.
    security: [{ bearerAuth: [] }]
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        example: "2e55099b-60c3-4f6e-a8a4-927893e06b60"
    responses:
      "200":
        description: Booking cancelled
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: "#/components/schemas/Booking" }
            example:
              success: true
              data:
                id: "2e55099b-60c3-4f6e-a8a4-927893e06b60"
                userId: "c83ee176-4733-4a8a-905a-e2b0ebeb20df"
                ticketTierId: "bce7708f-8eb9-4562-96de-70175956c0b0"
                concertId: "fb353d72-13c5-42c2-b35e-62607018d5f0"
                quantity: 2
                unitPrice: 3500000
                totalAmount: 7000000
                discountAmount: 0
                finalAmount: 7000000
                voucherCode: null
                status: cancelled
                idempotencyKey: "cf52e84c-b978-4702-bfc8-2fcdd4be5fad"
                isFlagged: false
                flagReason: null
                createdAt: "2026-05-09T14:04:39.923Z"
                updatedAt: "2026-05-09T14:06:24.945Z"
      "403":
        description: Forbidden — cancelling another user's booking
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ErrorResponse" }
            example: { success: false, type: "FORBIDDEN", message: "You can only cancel your own bookings" }
      "422":
        description: Cannot cancel — already cancelled or failed
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ErrorResponse" }
            example: { success: false, type: "BUSINESS_RULE", message: "Cannot cancel booking with status 'failed'" }

/bookings/{id}/status:
  patch:
    tags: [Bookings (Admin)]
    summary: Manually update booking status (admin)
    description: |
      **Allowed transitions:**
      - `pending` → `confirmed`
      - `pending` → `cancelled`
      - `pending` → `failed`
      - `confirmed` → `cancelled` (also releases reserved inventory)
    security: [{ bearerAuth: [] }]
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        example: "0129350f-a477-48f2-84e9-bd815d04feae"
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/UpdateStatusRequest" }
          example: { status: confirmed }
    responses:
      "200":
        description: Status updated
        content:
          application/json:
            schema:
              type: object
              properties:
                success: { type: boolean, example: true }
                data: { $ref: "#/components/schemas/Booking" }
            example:
              success: true
              data:
                id: "0129350f-a477-48f2-84e9-bd815d04feae"
                userId: "54c9aa07-ee4b-45e2-beb1-4944dfa72b9d"
                ticketTierId: "bce7708f-8eb9-4562-96de-70175956c0b0"
                concertId: "fb353d72-13c5-42c2-b35e-62607018d5f0"
                quantity: 2
                unitPrice: 3500000
                totalAmount: 7000000
                discountAmount: 0
                finalAmount: 7000000
                voucherCode: null
                status: confirmed
                idempotencyKey: "cf52e84c-b978-4702-bfc8-2fcdd4be5faa"
                isFlagged: false
                flagReason: null
                createdAt: "2026-05-09T15:04:12.208Z"
                updatedAt: "2026-05-09T15:04:14.380Z"
      "400":
        description: Validation error
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ErrorResponse" }
            example: { success: false, type: "VALIDATION", message: "status must be one of: confirmed, cancelled, failed" }
      "404":
        description: Booking not found
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ErrorResponse" }
            example: { success: false, type: "NOT_FOUND", message: "Booking not found" }
      "422":
        description: Invalid status transition
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ErrorResponse" }
            example: { success: false, type: "BUSINESS_RULE", message: "Cannot confirm booking with status 'cancelled'" }

/bookings/{id}/flag:
  patch:
    tags: [Bookings (Admin)]
    summary: Flag a suspicious booking (admin)
    security: [{ bearerAuth: [] }]
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        example: "0129350f-a477-48f2-84e9-bd815d04feae"
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/FlagBookingRequest" }
          example: { reason: "User made 5 bookings within 1 minute — suspected bot" }
    responses:
      "200":
        description: Booking flagged — returns full booking object
